<header class="site-header">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-logo">Javai</a>
    <nav class="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <a href="{{ .Site.BaseURL }}index.xml" class="rss-link" title="RSS Feed">RSS</a>
    </nav>
  </div>
</header>
